name: CI
on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

#checkov:skip=CKV2_GHA_1:This workflow uses explicit read-only permissions instead of write-all.
permissions:
  contents: read

jobs:
  trunk-check:
    name: Trunk Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Trunk Check
        uses: trunk-io/trunk-action@v1
        with:
          trunk-token: ${{ secrets.TRUNK_API_TOKEN }}
