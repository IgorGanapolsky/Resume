name: Trunk Check
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  trunk_check:
    name: Trunk Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trunk Check
        uses: trunk-io/trunk-action@v1
