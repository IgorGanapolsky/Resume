name: Auto Create PR

on:
  push:
    branches:
      - "main"
      - "claude/**"
      - "feat/**"
      - "fix/**"

permissions:
  contents: write
  pull-requests: write

jobs:
  create-pr:
    if: startsWith(github.ref_name, 'claude/') || startsWith(github.ref_name, 'feat/') || startsWith(github.ref_name, 'fix/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          EXISTING=$(gh pr list --head "${{ github.ref_name }}" --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -z "$EXISTING" ]; then
            COMMIT_MSG=$(git log -1 --format=%s)
            CHANGES=$(git log origin/main..HEAD --oneline | head -10)
            {
              echo "## Summary"
              echo "Auto-generated PR from \`${{ github.ref_name }}\`"
              echo
              echo "## Changes"
              echo "$CHANGES"
              echo
              echo "## Checklist"
              echo "- [ ] Tests pass"
              echo "- [ ] No secrets committed"
              echo "- [ ] Job files scrubbed"
              echo "- [ ] RAG index rebuilt if tracker changed"
            } > /tmp/pr_body.md
            if gh pr create \
              --title "$COMMIT_MSG" \
              --body-file /tmp/pr_body.md \
              --base main; then
              echo "✅ PR created"
            else
              echo "ℹ️ PR create skipped (likely already exists or no diff)"
            fi
          else
            echo "PR #$EXISTING already exists"
          fi

  noop-on-main:
    if: github.ref_name == 'main'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Auto PR workflow is not applicable on main."
