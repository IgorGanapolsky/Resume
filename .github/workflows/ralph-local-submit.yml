name: Ralph Local Submit

on:
  schedule:
    - cron: "*/30 * * * *"
  #checkov:skip=CKV_GHA_7:Manual dispatch inputs are required to cap submit attempts and select the browser backend.
  workflow_dispatch:
    inputs:
      max_submit_jobs:
        description: Max queued jobs to submit this run
        required: false
        default: 3
      browser_backend:
        description: Submit browser runtime auto | local
        required: false
        default: auto
      headless:
        description: Run local browser headless true | false
        required: false
        default: false
      browser_channel:
        description: Playwright browser channel override
        required: false
        default: chromium

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ralph-loop
  cancel-in-progress: false

jobs:
  submit:
    # trunk-ignore(actionlint/runner-label)
    runs-on: [self-hosted, macOS, resume-ci]
    timeout-minutes: 45
    env:
      ANCHOR_BROWSER_API_KEY: ${{ secrets.ANCHOR_BROWSER_API_KEY }}
      ANCHOR_BROWSER_PROFILE_NAME: ${{ vars.ANCHOR_BROWSER_PROFILE_NAME }}
      ANCHOR_BROWSER_PROFILE_PERSIST: ${{ vars.ANCHOR_BROWSER_PROFILE_PERSIST }}
      ANCHOR_BROWSER_PROXY_ACTIVE: ${{ vars.ANCHOR_BROWSER_PROXY_ACTIVE }}
      ANCHOR_BROWSER_PROXY_COUNTRY_CODE: ${{ vars.ANCHOR_BROWSER_PROXY_COUNTRY_CODE }}
      ANCHOR_BROWSER_PROXY_REGION: ${{ vars.ANCHOR_BROWSER_PROXY_REGION }}
      ANCHOR_BROWSER_PROXY_CITY: ${{ vars.ANCHOR_BROWSER_PROXY_CITY }}
      ANCHOR_BROWSER_EXTRA_STEALTH_ACTIVE: ${{ vars.ANCHOR_BROWSER_EXTRA_STEALTH_ACTIVE }}
      ANCHOR_BROWSER_STRICT: ${{ vars.ANCHOR_BROWSER_STRICT }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
          token: ${{ github.token }}

      - name: Install dependencies
        run: |
          python3 --version
          python3 -m venv .venv
          . .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install numpy "lancedb>=0.20,<1.0" playwright
          python -m playwright install chromium

      - name: Run local submit lane
        env:
          CI_SUBMIT_BROWSER_CHANNEL: ${{ github.event.inputs.browser_channel }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          . .venv/bin/activate
          MAX_SUBMIT="${{ github.event.inputs.max_submit_jobs }}"
          BROWSER_BACKEND="${{ github.event.inputs.browser_backend }}"
          HEADLESS="${{ github.event.inputs.headless }}"
          if [ -z "$MAX_SUBMIT" ]; then MAX_SUBMIT=3; fi
          if [ -z "$BROWSER_BACKEND" ]; then BROWSER_BACKEND=auto; fi
          if [ -z "$HEADLESS" ]; then HEADLESS=false; fi
          EXTRA_ARGS=""
          if [ "$HEADLESS" = "true" ]; then
            EXTRA_ARGS="--headless"
          fi
          python3 scripts/run_local_submit_lane.py \
            --max-submit-jobs "$MAX_SUBMIT" \
            --browser-backend "$BROWSER_BACKEND" \
            --browser-channel "${CI_SUBMIT_BROWSER_CHANNEL:-chromium}" \
            $EXTRA_ARGS

      - name: Upload submit diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ralph-local-submit-diagnostics-${{ github.run_id }}
          if-no-files-found: warn
          path: |
            applications/job_applications/*report*.json
            applications/job_applications/application_tracker.csv
            applications/*/submissions/*ci_confirmation*.png

      - name: Create Pull Request for local submit updates
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ github.token }}
          git-token: ${{ github.token }}
          commit-message: "chore(ralph-local-submit): submission lane update"
          title: "chore: Ralph Local Submit updates"
          body: |
            Automated local submit run.

            - Ran the no-spend submit lane on the self-hosted Mac runner
            - Captured updated tracker state and diagnostics
          add-paths: |
            applications/job_applications/application_tracker.csv
            applications/job_applications/ci_prepare_artifacts_report.json
            applications/job_applications/submission_artifact_audit_report.json
            applications/job_applications/tracker_integrity_report.json
            rag/data/applications.jsonl
            rag/data/arms.json
            rag/data/memory_long.jsonl
            rag/data/memory_short.jsonl
            rag/logs/events.jsonl
          branch: ralph/local-submit
          delete-branch: true
          labels: |
            automation
